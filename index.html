<!DOCTYPE html>
<html lang="es" style="color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Grupo Doze">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Grupo Doze</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif !important}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --green-bg:#f0fdf4;--green:#166534;--green-b:#bbf7d0;
  --amber-bg:#fffbeb;--amber:#92400e;--amber-b:#fde68a;
  --red-bg:#fef2f2;--red:#991b1b;--red-b:#fecaca;
  --blue-bg:#eff6ff;--blue:#1e40af;--blue-b:#bfdbfe;
  --purple-bg:#faf5ff;--purple:#6b21a8;--purple-b:#e9d5ff;
  --radius:10px;--radius-sm:7px;
}
body{background:var(--bg3);color:var(--text);min-height:100vh;padding-bottom:80px}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:7px 2px;font-size:11px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--text2);text-align:center;font-weight:500;white-space:nowrap;min-width:0}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sync-bar{background:var(--amber-bg);border-bottom:1px solid var(--amber-b);padding:8px 16px;font-size:12px;color:var(--amber);display:none;align-items:center;gap:8px}
.sync-bar.show{display:flex}
.spinner{width:14px;height:14px;border:2px solid var(--amber-b);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
.metric{background:var(--bg);border-radius:var(--radius);padding:12px;border:1px solid var(--border)}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}
.metric-value.warn{color:var(--amber)}
.page{display:none;padding:0 16px}
.page.active{display:block}
.section{background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-title{font-size:15px;font-weight:600}
button{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);cursor:pointer;color:var(--text);font-weight:500;transition:opacity .15s}
button:active{opacity:.7}
button.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
button.green{background:var(--green-bg);color:var(--green);border-color:var(--green-b);font-size:13px;padding:7px 12px}
button.danger-btn{color:var(--red);border-color:var(--red-b);font-size:13px;padding:7px 12px}
button.purple-btn{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-b);font-size:13px;padding:7px 12px}
button.amber-btn{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b);font-size:13px;padding:7px 12px}
button:disabled{opacity:.4;cursor:not-allowed}
.search-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:10px 12px;font-size:15px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
textarea{resize:vertical;min-height:80px;font-size:14px;line-height:1.5}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.filter-sel{flex:1;min-width:100px;font-size:13px;padding:8px 10px}
.search-inp{flex:2;min-width:130px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--text2);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
th.sort{cursor:pointer}
td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.ok{background:var(--green-bg);color:var(--green)}
.badge.low{background:var(--amber-bg);color:var(--amber)}
.badge.out{background:var(--red-bg);color:var(--red)}
.badge.dest{background:var(--blue-bg);color:var(--blue)}
.badge.cat{background:var(--purple-bg);color:var(--purple)}
.badge.urgente{background:var(--red-bg);color:var(--red)}
.badge.pendiente{background:var(--amber-bg);color:var(--amber)}
.badge.realizado{background:var(--green-bg);color:var(--green)}
.row-acts{display:flex;gap:6px;flex-wrap:wrap}
.row-acts button{padding:5px 10px;font-size:12px}
.empty{text-align:center;padding:24px;color:var(--text2);font-size:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.hist-day-hd{display:flex;align-items:center;gap:8px;padding:10px 0 6px;border-bottom:1px solid var(--border2);margin-top:4px;flex-wrap:wrap}
.hist-day-lbl{font-size:13px;font-weight:600;color:var(--text2)}
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-dot.in{background:#16a34a}
.hist-dot.out{background:#dc2626}
.hist-name{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-nota{font-size:12px;color:var(--text2)}
.hist-qty{font-size:14px;font-weight:700;color:var(--text);flex-shrink:0}
.export-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.export-bar .lbl{font-size:12px;color:var(--text2);align-self:center}
.msg{font-size:13px;margin-top:10px;min-height:18px}
.msg.ok{color:var(--green)}
.msg.err{color:var(--red)}
.dest-wrap{display:none}
.prod-name{font-size:14px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.load-screen{position:fixed;inset:0;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:500}
.load-screen.hidden{display:none}
.load-spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
.load-sub{font-size:14px;color:var(--text2)}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2)}
.cat-name{font-size:14px;font-weight:500}
.cat-count{font-size:12px;color:var(--text2)}

/* ===== PARTES DE TRABAJO ===== */
.parte-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative}
.parte-card.urgente{border-left:4px solid var(--red)}
.parte-card.pendiente{border-left:4px solid var(--amber)}
.parte-card.realizado{border-left:4px solid var(--green);opacity:.75}
.parte-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.parte-titulo{font-size:15px;font-weight:600;flex:1}
.parte-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.parte-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.parte-fotos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.parte-foto{width:64px;height:64px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer}
.parte-actions{display:flex;gap:6px;flex-wrap:wrap}
.parte-actions button{font-size:12px;padding:5px 10px}
.parte-fecha{font-size:11px;color:var(--text3)}

/* Lightbox fotos */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--radius);object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer;line-height:1;background:none;border:none;padding:4px 8px}

/* Upload fotos */
.foto-upload-area{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:8px;transition:border-color .2s}
.foto-upload-area:hover{border-color:#3b82f6}
.foto-previews{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.foto-preview-wrap{position:relative;display:inline-block}
.foto-preview-wrap img{width:64px;height:64px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border)}
.foto-del-btn{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;line-height:1}

/* Diario */
.diario-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.diario-fecha{flex:1;min-width:140px}
.diario-resumen{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text2)}
.diario-resumen strong{color:var(--text)}
.diario-parte{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;border-left:4px solid var(--green)}
.diario-parte-titulo{font-size:14px;font-weight:600;margin-bottom:4px}
.diario-parte-meta{font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="load-screen" id="load-screen">
  <img src="logo_grupo_doze.jpeg" alt="Grupo Doze" style="height:50px;object-fit:contain">
  <div class="load-spin"></div>
  <div class="load-sub">Cargando datos...</div>
</div>

<div class="topbar">
  <img src="logo_grupo_doze.jpeg" alt="Grupo Doze" style="height:60px;width:100%;object-fit:contain;display:block;margin:0 auto 12px auto">
  <div class="tabs">
    <button class="tab active" onclick="showPage('productos',this)">Productos</button>
    <button class="tab" onclick="showPage('movimientos',this)">Movimientos</button>
    <button class="tab" onclick="showPage('historial',this)">Historial</button>
    <button class="tab" onclick="showPage('categorias',this)">Categorías</button>
    <button class="tab" onclick="showPage('partes',this)">Partes</button>
    <button class="tab" onclick="showPage('diario',this)">Diario</button>
  </div>
</div>

<div class="sync-bar" id="sync-bar">
  <div class="spinner"></div>
  <span id="sync-msg">Guardando...</span>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-label">Referencias</div><div class="metric-value" id="m-total">—</div></div>
  <div class="metric"><div class="metric-label">En stock</div><div class="metric-value" id="m-units">—</div></div>
  <div class="metric"><div class="metric-label">Alertas</div><div class="metric-value warn" id="m-low">—</div></div>
</div>

<!-- PRODUCTOS -->
<div class="page active" id="page-productos">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Inventario</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="green" onclick="exportStockCSV()">Exportar .csv</button>
        <button class="primary" onclick="openModal('addprod')">+ Añadir</button>
      </div>
    </div>
    <div class="search-row">
      <input class="search-inp" type="text" placeholder="Buscar producto..." oninput="renderProductos()" id="search-prod">
      <select class="filter-sel" onchange="renderProductos()" id="filter-cat">
        <option value="">Todas las categorías</option>
      </select>
    </div>
    <div class="search-row">
      <select class="filter-sel" onchange="renderProductos()" id="filter-estado">
        <option value="">Todos los estados</option>
        <option value="ok">OK</option>
        <option value="low">Stock bajo</option>
        <option value="out">Sin stock</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th class="sort" onclick="toggleSort('nombre')">Producto <span id="arr-nombre">↑</span></th>
          <th>Uds</th>
          <th class="sort" onclick="toggleSort('estado')">Estado <span id="arr-estado">↕</span></th>
          <th></th>
        </tr></thead>
        <tbody id="tbody-productos"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MOVIMIENTOS -->
<div class="page" id="page-movimientos">
  <div class="section">
    <div class="section-header"><span class="section-title">Registrar movimiento</span></div>
    <div class="field"><label>Categoría</label>
      <select id="mov-cat" onchange="renderMovProdSelect()"></select>
    </div>
    <div class="field"><label>Producto</label><select id="mov-prod"></select></div>
    <div class="field"><label>Tipo</label>
      <select id="mov-tipo" onchange="toggleDest(this.value)">
        <option value="entrada">Entrada — recibo mercancía</option>
        <option value="salida">Salida — venta / uso</option>
      </select>
    </div>
    <div class="dest-wrap" id="dest-wrap">
      <div class="field"><label>Destino</label>
        <select id="mov-dest" onchange="toggleOtro(this.value)">
          <option value="Doze">Doze</option>
          <option value="Mesón">Mesón</option>
          <option value="Campo de Tiro">Campo de Tiro</option>
          <option value="Revolutum">Revolutum</option>
          <option value="Corte y Cata">Corte y Cata</option>
          <option value="otro">Otro...</option>
        </select>
      </div>
      <div class="field" id="dest-otro-wrap" style="display:none">
        <label>Especifica destino</label>
        <input type="text" id="mov-dest-otro" placeholder="Nombre del destino">
      </div>
    </div>
    <div class="field"><label>Cantidad</label><input type="number" id="mov-cant" min="1" value="1"></div>
    <div class="field"><label>Nota (opcional)</label><input type="text" id="mov-nota" placeholder="Observaciones..."></div>
    <button class="primary" id="btn-guardar" style="width:100%;justify-content:center" onclick="registrarMovimiento()">Guardar movimiento</button>
    <div class="msg" id="mov-msg"></div>
  </div>
</div>

<!-- HISTORIAL -->
<div class="page" id="page-historial">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Historial</span>
      <button class="danger-btn" onclick="limpiarHistorial()">Limpiar</button>
    </div>
    <div class="export-bar">
      <span class="lbl">Exportar:</span>
      <button class="green" onclick="exportHistCSV('')">Todo</button>
      <button class="green" onclick="exportHistCSV('Doze')">Doze</button>
      <button class="green" onclick="exportHistCSV('Mesón')">Mesón</button>
      <button class="green" onclick="exportHistCSV('Campo de Tiro')">C.Tiro</button>
      <button class="green" onclick="exportHistCSV('Revolutum')">Revolutum</button>
      <button class="green" onclick="exportHistCSV('Corte y Cata')">C.Cata</button>
    </div>
    <div class="search-row">
      <select class="filter-sel" onchange="renderHistorial()" id="filter-hdest">
        <option value="">Todos los destinos</option>
        <option value="Doze">Doze</option>
        <option value="Mesón">Mesón</option>
        <option value="Campo de Tiro">Campo de Tiro</option>
        <option value="Revolutum">Revolutum</option>
        <option value="Corte y Cata">Corte y Cata</option>
      </select>
      <select class="filter-sel" onchange="renderHistorial()" id="filter-hcat">
        <option value="">Todas las categorías</option>
      </select>
    </div>
    <div class="search-row">
      <select class="filter-sel" onchange="renderHistorial()" id="filter-hmes">
        <option value="">Todos los meses</option>
        <option value="01">Enero</option>
        <option value="02">Febrero</option>
        <option value="03">Marzo</option>
        <option value="04">Abril</option>
        <option value="05">Mayo</option>
        <option value="06">Junio</option>
        <option value="07">Julio</option>
        <option value="08">Agosto</option>
        <option value="09">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
      </select>
      <select class="filter-sel" onchange="renderHistorial()" id="filter-htipo">
        <option value="">Entradas y salidas</option>
        <option value="entrada">Solo entradas</option>
        <option value="salida">Solo salidas</option>
      </select>
    </div>
    <div id="historial-list"></div>
  </div>
</div>

<!-- CATEGORIAS -->
<div class="page" id="page-categorias">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Categorías</span>
      <button class="primary" onclick="openModal('addcat')">+ Nueva</button>
    </div>
    <div class="cat-list" id="cat-list"></div>
  </div>
</div>

<!-- PARTES DE TRABAJO -->
<div class="page" id="page-partes">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Partes de trabajo</span>
      <button class="primary" onclick="openModal('addparte')">+ Nuevo parte</button>
    </div>
    <div class="search-row">
      <input class="search-inp" type="text" placeholder="Buscar parte..." oninput="renderPartes()" id="search-parte">
      <select class="filter-sel" onchange="renderPartes()" id="filter-plocal">
        <option value="">Todos los locales</option>
        <option value="Doze">Doze</option>
        <option value="Mesón">Mesón</option>
        <option value="Campo de Tiro">Campo de Tiro</option>
        <option value="Revolutum">Revolutum</option>
        <option value="Corte y Cata">Corte y Cata</option>
      </select>
    </div>
    <div class="search-row">
      <select class="filter-sel" onchange="renderPartes()" id="filter-pestado">
        <option value="">Todos los estados</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="pendiente">🟡 Pendiente</option>
        <option value="realizado">🟢 Realizado</option>
      </select>
    </div>
    <div id="partes-list"></div>
  </div>
</div>

<!-- DIARIO -->
<div class="page" id="page-diario">
  <div class="section">
    <div class="section-header">
      <span class="section-title">Diario de trabajo</span>
      <button class="green" onclick="exportDiarioCSV()">Exportar .csv</button>
    </div>
    <div class="diario-header">
      <input type="date" class="diario-fecha" id="diario-fecha" onchange="renderDiario()">
    </div>
    <div class="diario-resumen" id="diario-resumen"></div>
    <div id="diario-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Añadir producto</h2>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- LIGHTBOX FOTOS -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const SUPABASE_URL='https://mkqthvfygmuypycwdaza.supabase.co';
const SUPABASE_KEY='sb_publishable_xMFVUHJRWOWyA4MgnOnmRQ_IK6lQIFW';
const STORAGE_BUCKET='partes-fotos';

let productos=[],historial=[],categorias=[],partes=[],partesFotos=[];
let editId=null,sortKey='nombre',sortDir=1,modalMode='';
let fotosNuevas=[]; // archivos pendientes de subir al editar/crear parte
let fotosEliminar=[]; // ids de fotos a eliminar al guardar

// ===== API SUPABASE =====
async function api(path,method='GET',body){
  const opts={method,headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  if(method==='GET') return r.json();
  return true;
}

// ===== STORAGE SUPABASE =====
async function subirFoto(file,parteId){
  const ext=file.name.split('.').pop();
  const nombre=`${parteId}_${Date.now()}.${ext}`;
  const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${nombre}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  });
  if(!r.ok) throw new Error('Error al subir foto');
  return {nombre, url:`${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${nombre}`};
}

async function eliminarFotoStorage(nombre){
  await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${nombre}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
}

// ===== SYNC UI =====
function showSync(msg){document.getElementById('sync-bar').classList.add('show');document.getElementById('sync-msg').textContent=msg||'Guardando...';}
function hideSync(){document.getElementById('sync-bar').classList.remove('show');}

// ===== CARGA INICIAL =====
async function cargarDatos(){
  try{
    let [prods,hist,cats,pts,ptsFotos]=await Promise.all([
      api('productos?order=nombre.asc&select=*'),
      api('historial?order=created_at.desc&select=*'),
      api('categorias?order=nombre.asc&select=*').catch(()=>[]),
      api('partes?order=fecha_creacion.desc&select=*').catch(()=>[]),
      api('partes_fotos?select=*').catch(()=>[])
    ]);

    if(!Array.isArray(cats)||cats.length===0){
      try{
        await api('categorias','POST',[{id:'cat0',nombre:'Licores y vinos'}]);
        cats=[{id:'cat0',nombre:'Licores y vinos'}];
        if(prods.length>0){
          for(const p of prods) await api('productos?id=eq.'+p.id,'PATCH',{categoria:'cat0'});
          prods=prods.map(p=>({...p,categoria:'cat0'}));
        }
      }catch(e){cats=[{id:'cat0',nombre:'Licores y vinos'}];}
    }

    categorias=cats;
    productos=prods;
    historial=hist;
    partes=Array.isArray(pts)?pts:[];
    partesFotos=Array.isArray(ptsFotos)?ptsFotos:[];

    document.getElementById('load-screen').classList.add('hidden');
    poblarFiltrosCat();
    renderProductos();
    renderCategorias();

    // Inicializar fecha diario a hoy
    const hoyVal=fechaHoyISO();
    document.getElementById('diario-fecha').value=hoyVal;

  }catch(e){
    document.getElementById('load-screen').innerHTML='<div style="font-size:20px;font-weight:700">Error</div><div style="font-size:14px;color:#6b7280;margin-top:8px">No se pudo conectar.<br>Comprueba tu conexión.</div>';
  }
}

// ===== HELPERS FECHA =====
function fechaHoyISO(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fechaHoyDisplay(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function isoADisplay(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-');
  return `${d}/${m}/${y}`;
}
function hoy(){
  const d=new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// ===== NAVEGACIÓN =====
function poblarFiltrosCat(){
  const opts=categorias.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  const all='<option value="">Todas las categorías</option>';
  document.getElementById('filter-cat').innerHTML=all+opts;
  document.getElementById('filter-hcat').innerHTML=all+opts;
  const movCat=document.getElementById('mov-cat');
  if(movCat) movCat.innerHTML='<option value="">— Todas —</option>'+opts;
}

function nomCat(id){
  const c=categorias.find(x=>x.id===id);
  return c?c.nombre:'';
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='movimientos'){poblarFiltrosCat();renderMovCatSelect();}
  if(p==='historial') renderHistorial();
  if(p==='categorias') renderCategorias();
  if(p==='partes') renderPartes();
  if(p==='diario') renderDiario();
}

// ===== PRODUCTOS =====
function estadoVal(p){return p.stock===0?0:p.stock<=p.min?1:2;}
function badge(s,m){
  if(s===0) return '<span class="badge out">Sin stock</span>';
  if(s<=m) return '<span class="badge low">Stock bajo</span>';
  return '<span class="badge ok">OK</span>';
}

function toggleSort(k){
  if(sortKey===k){sortDir*=-1;}else{sortKey=k;sortDir=1;}
  ['nombre','estado'].forEach(key=>{
    const el=document.getElementById('arr-'+key);
    if(!el) return;
    el.textContent=key===sortKey?(sortDir===1?'↑':'↓'):'↕';
    el.style.opacity=key===sortKey?'1':'0.4';
  });
  renderProductos();
}

function renderProductos(){
  const q=(document.getElementById('search-prod').value||'').toLowerCase();
  const ef=document.getElementById('filter-estado').value;
  const ec=document.getElementById('filter-cat').value;
  let lista=[...productos];
  if(q) lista=lista.filter(p=>p.nombre.toLowerCase().includes(q));
  if(ef==='ok') lista=lista.filter(p=>p.stock>p.min);
  else if(ef==='low') lista=lista.filter(p=>p.stock>0&&p.stock<=p.min);
  else if(ef==='out') lista=lista.filter(p=>p.stock===0);
  if(ec) lista=lista.filter(p=>p.categoria===ec);
  lista.sort((a,b)=>sortKey==='nombre'?sortDir*a.nombre.localeCompare(b.nombre,'es'):sortDir*(estadoVal(a)-estadoVal(b)));
  const tb=document.getElementById('tbody-productos');
  if(!lista.length){tb.innerHTML='<tr><td colspan="4" class="empty">Sin resultados</td></tr>';updateMetrics();return;}
  tb.innerHTML=lista.map(p=>`<tr>
    <td>
      <div class="prod-name" title="${p.nombre}">${p.nombre}</div>
      ${p.categoria?`<span class="badge cat" style="margin-top:3px;display:inline-block">${nomCat(p.categoria)}</span>`:''}
    </td>
    <td style="font-weight:700">${p.stock}</td>
    <td>${badge(p.stock,p.min)}</td>
    <td><div class="row-acts">
      <button onclick="openModal('editprod','${p.id}')">Editar</button>
      <button class="danger-btn" onclick="eliminar('${p.id}')">Borrar</button>
    </div></td>
  </tr>`).join('');
  updateMetrics();
}

function updateMetrics(){
  document.getElementById('m-total').textContent=productos.length;
  document.getElementById('m-units').textContent=productos.reduce((a,p)=>a+p.stock,0);
  document.getElementById('m-low').textContent=productos.filter(p=>p.stock===0||p.stock<=p.min).length;
}

// ===== MODAL GENERAL =====
function openModal(mode,id){
  modalMode=mode;
  editId=id||null;
  fotosNuevas=[];
  fotosEliminar=[];
  const overlay=document.getElementById('modal-overlay');
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  const actions=document.getElementById('modal-actions');

  if(mode==='addprod'||mode==='editprod'){
    title.textContent=mode==='editprod'?'Editar producto':'Añadir producto';
    const p=mode==='editprod'?productos.find(x=>x.id===id):null;
    const catOpts=categorias.map(c=>`<option value="${c.id}" ${p&&p.categoria===c.id?'selected':''}>${c.nombre}</option>`).join('');
    const unidad=p?(p.unidad||'cajas'):'unidades';
    body.innerHTML=`
      <div class="field"><label>Nombre</label><input type="text" id="f-nombre" value="${p?p.nombre:''}"></div>
      <div class="field"><label>Categoría</label><select id="f-cat"><option value="">Sin categoría</option>${catOpts}</select></div>
      <div class="field"><label>Unidad</label><select id="f-unidad">
        <option value="cajas" ${unidad==='cajas'?'selected':''}>Cajas</option>
        <option value="unidades" ${unidad==='unidades'?'selected':''}>Unidades</option>
        <option value="metros" ${unidad==='metros'?'selected':''}>Metros</option>
        <option value="packs" ${unidad==='packs'?'selected':''}>Packs</option>
      </select></div>
      <div class="field"><label>Stock actual</label><input type="number" id="f-stock" min="0" value="${p?p.stock:0}"></div>
      <div class="field"><label>Alerta de stock bajo</label><input type="number" id="f-min" min="0" value="${p?p.min:3}"></div>
    `;
    actions.innerHTML='<button onclick="closeModal()">Cancelar</button><button class="primary" onclick="guardarProducto()">Guardar</button>';

  } else if(mode==='addcat'||mode==='editcat'){
    title.textContent=mode==='editcat'?'Editar categoría':'Nueva categoría';
    const c=mode==='editcat'?categorias.find(x=>x.id===id):null;
    body.innerHTML=`<div class="field"><label>Nombre</label><input type="text" id="f-catnom" value="${c?c.nombre:''}"></div>`;
    actions.innerHTML='<button onclick="closeModal()">Cancelar</button><button class="primary" onclick="guardarCategoria()">Guardar</button>';

  } else if(mode==='addparte'||mode==='editparte'){
    title.textContent=mode==='editparte'?'Editar parte':'Nuevo parte de trabajo';
    const pt=mode==='editparte'?partes.find(x=>x.id===id):null;
    const fotosActuales=mode==='editparte'?partesFotos.filter(f=>f.parte_id===id):[];
    const locales=['Doze','Mesón','Campo de Tiro','Revolutum','Corte y Cata'];
    const localOpts=locales.map(l=>`<option value="${l}" ${pt&&pt.local===l?'selected':''}>${l}</option>`).join('');
    const estadoOpts=[
      {v:'urgente',l:'🔴 Urgente'},
      {v:'pendiente',l:'🟡 Pendiente'},
      {v:'realizado',l:'🟢 Realizado'}
    ].map(o=>`<option value="${o.v}" ${pt&&pt.estado===o.v?'selected':o.v==='pendiente'&&!pt?'selected':''}>${o.l}</option>`).join('');

    const fotosHTML=fotosActuales.map(f=>`
      <div class="foto-preview-wrap" id="fwrap-${f.id}">
        <img src="${f.url}" onclick="openLightbox('${f.url}')">
        <button class="foto-del-btn" onclick="marcarFotoEliminar('${f.id}','${f.nombre||''}')">✕</button>
      </div>`).join('');

    body.innerHTML=`
      <div class="field"><label>Título</label><input type="text" id="f-ptitulo" value="${pt?pt.titulo:''}"></div>
      <div class="field"><label>Local</label><select id="f-plocal">${localOpts}</select></div>
      <div class="field"><label>Estado</label><select id="f-pestado">${estadoOpts}</select></div>
      <div class="field"><label>Descripción / Ubicación dentro del local</label><textarea id="f-pdesc">${pt?pt.descripcion||'':''}</textarea></div>
      <div class="field"><label>Notas adicionales</label><input type="text" id="f-pnotas" value="${pt?pt.notas||'':''}"></div>
      <div class="field">
        <label>Fotos</label>
        <div class="foto-upload-area" onclick="document.getElementById('foto-input').click()">📷 Toca para añadir fotos</div>
        <input type="file" id="foto-input" accept="image/*" multiple style="display:none" onchange="previsualizarFotos(this)">
        <div class="foto-previews" id="foto-previews-nuevas"></div>
        ${fotosActuales.length?`<div style="margin-top:8px;font-size:12px;color:var(--text2)">Fotos existentes:</div><div class="foto-previews" id="foto-previews-actuales">${fotosHTML}</div>`:''}
      </div>
    `;
    actions.innerHTML='<button onclick="closeModal()">Cancelar</button><button class="primary" onclick="guardarParte()">Guardar</button>';
  }

  overlay.classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  fotosNuevas=[];
  fotosEliminar=[];
}

// ===== PRODUCTOS CRUD =====
async function guardarProducto(){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre) return;
  const stock=parseInt(document.getElementById('f-stock').value)||0;
  const min=parseInt(document.getElementById('f-min').value)||3;
  const categoria=document.getElementById('f-cat').value||null;
  const unidad=document.getElementById('f-unidad').value||'unidades';
  showSync('Guardando producto...');
  try{
    if(editId){
      await api(`productos?id=eq.${editId}`,'PATCH',{nombre,stock,min,categoria,unidad});
      const p=productos.find(x=>x.id===editId);
      Object.assign(p,{nombre,stock,min,categoria,unidad});
    }else{
      const id='p'+Date.now();
      await api('productos','POST',[{id,nombre,stock,min,categoria,unidad}]);
      productos.push({id,nombre,stock,min,categoria,unidad});
    }
    hideSync();closeModal();renderProductos();poblarFiltrosCat();
  }catch(e){hideSync();alert('Error al guardar: '+e.message);}
}

async function guardarCategoria(){
  const nombre=document.getElementById('f-catnom').value.trim();
  if(!nombre) return;
  showSync('Guardando categoría...');
  try{
    if(editId){
      await api(`categorias?id=eq.${editId}`,'PATCH',{nombre});
      const c=categorias.find(x=>x.id===editId);
      c.nombre=nombre;
    }else{
      const id='cat'+Date.now();
      await api('categorias','POST',[{id,nombre}]);
      categorias.push({id,nombre});
    }
    hideSync();closeModal();renderCategorias();poblarFiltrosCat();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

async function eliminar(id){
  if(!confirm('¿Eliminar este producto?')) return;
  showSync('Eliminando...');
  try{
    await api(`productos?id=eq.${id}`,'DELETE');
    productos=productos.filter(p=>p.id!==id);
    hideSync();renderProductos();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

async function eliminarCat(id){
  const enUso=productos.some(p=>p.categoria===id);
  if(enUso){alert('No puedes eliminar una categoría con productos asignados.');return;}
  if(!confirm('¿Eliminar esta categoría?')) return;
  showSync('Eliminando...');
  try{
    await api(`categorias?id=eq.${id}`,'DELETE');
    categorias=categorias.filter(c=>c.id!==id);
    hideSync();renderCategorias();poblarFiltrosCat();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

function renderCategorias(){
  const el=document.getElementById('cat-list');
  if(!categorias.length){el.innerHTML='<div class="empty">Sin categorías todavía</div>';return;}
  el.innerHTML=categorias.map(c=>{
    const count=productos.filter(p=>p.categoria===c.id).length;
    return `<div class="cat-item">
      <div>
        <div class="cat-name">${c.nombre}</div>
        <div class="cat-count">${count} producto${count!==1?'s':''}</div>
      </div>
      <div class="row-acts">
        <button onclick="openModal('editcat','${c.id}')">Editar</button>
        <button class="danger-btn" onclick="eliminarCat('${c.id}')">Borrar</button>
      </div>
    </div>`;
  }).join('');
}

// ===== MOVIMIENTOS =====
function renderMovCatSelect(){
  const sel=document.getElementById('mov-cat');
  sel.innerHTML='<option value="">— Todas —</option>'+categorias.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  renderMovProdSelect();
}

function renderMovProdSelect(){
  const catId=document.getElementById('mov-cat').value;
  let lista=[...productos].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
  if(catId) lista=lista.filter(p=>p.categoria===catId);
  const unidadNom=p=>{
    const prod=productos.find(x=>x.id===p.id);
    return prod&&prod.unidad?prod.unidad:'uds';
  };
  document.getElementById('mov-prod').innerHTML=lista.length
    ?lista.map(p=>`<option value="${p.id}">${p.nombre} (${p.stock} ${unidadNom(p)})</option>`).join('')
    :'<option>— Sin productos —</option>';
  toggleDest(document.getElementById('mov-tipo').value);
}

function toggleDest(val){
  document.getElementById('dest-wrap').style.display=val==='salida'?'block':'none';
  if(val!=='salida') document.getElementById('dest-otro-wrap').style.display='none';
}
function toggleOtro(val){
  document.getElementById('dest-otro-wrap').style.display=val==='otro'?'block':'none';
}

async function registrarMovimiento(){
  const id=document.getElementById('mov-prod').value;
  const tipo=document.getElementById('mov-tipo').value;
  const cant=parseInt(document.getElementById('mov-cant').value)||0;
  const nota=document.getElementById('mov-nota').value.trim();
  const msgEl=document.getElementById('mov-msg');
  let destino='';
  if(tipo==='salida'){
    const sel=document.getElementById('mov-dest').value;
    destino=sel==='otro'?(document.getElementById('mov-dest-otro').value.trim()||'Otro'):sel;
  }
  if(!cant||cant<1){msgEl.className='msg err';msgEl.textContent='Cantidad inválida.';return;}
  const p=productos.find(x=>x.id===id);
  if(!p) return;
  if(tipo==='salida'&&cant>p.stock){msgEl.className='msg err';msgEl.textContent='Stock insuficiente.';return;}
  const nuevoStock=p.stock+(tipo==='entrada'?cant:-cant);
  const hid='h'+Date.now();
  const fecha=fechaHoyDisplay();
  const catId=p.categoria||'';
  const btn=document.getElementById('btn-guardar');
  btn.disabled=true;
  showSync('Guardando movimiento...');
  try{
    await api(`productos?id=eq.${id}`,'PATCH',{stock:nuevoStock});
    await api('historial','POST',[{id:hid,prod:p.nombre,tipo,cant,destino,nota,fecha,categoria:catId}]);
    p.stock=nuevoStock;
    historial.unshift({id:hid,prod:p.nombre,tipo,cant,destino,nota,fecha,categoria:catId});
    hideSync();
    renderMovProdSelect();
    msgEl.className='msg ok';
    msgEl.textContent=tipo==='entrada'?`${cant} añadidos. Stock: ${p.stock}`:`${cant} → ${destino}. Stock: ${p.stock}`;
    document.getElementById('mov-cant').value='1';
    document.getElementById('mov-nota').value='';
    setTimeout(()=>{msgEl.textContent='';msgEl.className='msg';},3500);
  }catch(e){hideSync();msgEl.className='msg err';msgEl.textContent='Error. Comprueba tu conexión.';}
  btn.disabled=false;
}

// ===== HISTORIAL =====
function renderHistorial(){
  const el=document.getElementById('historial-list');
  const fd=document.getElementById('filter-hdest').value;
  const fc=document.getElementById('filter-hcat').value;
  const fm=document.getElementById('filter-hmes').value;
  const ft=document.getElementById('filter-htipo').value;
  let lista=[...historial];
  if(fd) lista=lista.filter(h=>h.destino===fd);
  if(fc) lista=lista.filter(h=>h.categoria===fc);
  if(fm) lista=lista.filter(h=>{const parts=h.fecha.split('/');return parts[1]===fm;});
  if(ft) lista=lista.filter(h=>h.tipo===ft);
  if(!lista.length){el.innerHTML='<div class="empty">Sin movimientos</div>';return;}
  let html='',lastKey='';
  lista.forEach(h=>{
    const key=h.fecha+'|'+(h.destino||'');
    if(key!==lastKey){
      lastKey=key;
      let hd=`<span class="hist-day-lbl">${h.fecha}</span>`;
      if(h.destino) hd+=` <span class="badge dest">${h.destino}</span>`;
      if(h.categoria) hd+=` <span class="badge cat">${nomCat(h.categoria)}</span>`;
      html+=`<div class="hist-day-hd">${hd}</div>`;
    }
    html+=`<div class="hist-row">
      <div class="hist-dot ${h.tipo==='entrada'?'in':'out'}"></div>
      <span class="hist-name">${h.prod}${h.nota?` <span class="hist-nota">· ${h.nota}</span>`:''}</span>
      <span class="hist-qty">${h.cant}</span>
    </div>`;
  });
  el.innerHTML=html;
}

async function limpiarHistorial(){
  if(!confirm('¿Borrar todo el historial?')) return;
  showSync('Limpiando...');
  try{
    await api('historial?id=neq.VOID','DELETE');
    historial=[];hideSync();renderHistorial();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

// ===== PARTES DE TRABAJO =====

function previsualizarFotos(input){
  const container=document.getElementById('foto-previews-nuevas');
  Array.from(input.files).forEach(file=>{
    fotosNuevas.push(file);
    const idx=fotosNuevas.length-1;
    const reader=new FileReader();
    reader.onload=e=>{
      const wrap=document.createElement('div');
      wrap.className='foto-preview-wrap';
      wrap.id='fnueva-'+idx;
      wrap.innerHTML=`<img src="${e.target.result}" onclick="openLightbox('${e.target.result}')">
        <button class="foto-del-btn" onclick="quitarFotoNueva(${idx})">✕</button>`;
      container.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function quitarFotoNueva(idx){
  fotosNuevas[idx]=null;
  const el=document.getElementById('fnueva-'+idx);
  if(el) el.remove();
}

function marcarFotoEliminar(fotoId,nombre){
  fotosEliminar.push({id:fotoId,nombre});
  const el=document.getElementById('fwrap-'+fotoId);
  if(el) el.remove();
}

async function guardarParte(){
  const titulo=document.getElementById('f-ptitulo').value.trim();
  if(!titulo){alert('El título es obligatorio.');return;}
  const local=document.getElementById('f-plocal').value;
  const estado=document.getElementById('f-pestado').value;
  const descripcion=document.getElementById('f-pdesc').value.trim();
  const notas=document.getElementById('f-pnotas').value.trim();
  const esNuevo=modalMode==='addparte';
  const parteId=esNuevo?'pt'+Date.now():editId;
  const fechaHoy=fechaHoyISO();

  showSync('Guardando parte...');
  try{
    // Eliminar fotos marcadas
    for(const f of fotosEliminar){
      await eliminarFotoStorage(f.nombre||f.id);
      await api(`partes_fotos?id=eq.${f.id}`,'DELETE');
      partesFotos=partesFotos.filter(x=>x.id!==f.id);
    }

    // Subir fotos nuevas
    const nuevasSubidas=[];
    for(const file of fotosNuevas){
      if(!file) continue;
      const {nombre,url}=await subirFoto(file,parteId);
      const fid='pf'+Date.now()+Math.random().toString(36).slice(2,6);
      await api('partes_fotos','POST',[{id:fid,parte_id:parteId,url,nombre}]);
      const fotoObj={id:fid,parte_id:parteId,url,nombre};
      partesFotos.push(fotoObj);
      nuevasSubidas.push(fotoObj);
    }

    const fechaRealizado=estado==='realizado'?fechaHoy:null;

    if(esNuevo){
      await api('partes','POST',[{id:parteId,titulo,local,estado,descripcion,notas,fecha_creacion:fechaHoy,fecha_realizado:fechaRealizado}]);
      partes.unshift({id:parteId,titulo,local,estado,descripcion,notas,fecha_creacion:fechaHoy,fecha_realizado:fechaRealizado});
    }else{
      // Si cambia a realizado y no tenía fecha, poner hoy
      const parteActual=partes.find(x=>x.id===editId);
      const fechaRealizadoFinal=estado==='realizado'?(parteActual&&parteActual.fecha_realizado?parteActual.fecha_realizado:fechaHoy):null;
      await api(`partes?id=eq.${editId}`,'PATCH',{titulo,local,estado,descripcion,notas,fecha_realizado:fechaRealizadoFinal});
      if(parteActual) Object.assign(parteActual,{titulo,local,estado,descripcion,notas,fecha_realizado:fechaRealizadoFinal});
    }

    hideSync();closeModal();renderPartes();
    if(document.getElementById('page-diario').classList.contains('active')) renderDiario();
  }catch(e){hideSync();alert('Error al guardar: '+e.message);}
}

async function eliminarParte(id){
  if(!confirm('¿Eliminar este parte de trabajo?')) return;
  showSync('Eliminando...');
  try{
    // Eliminar fotos de storage
    const fotos=partesFotos.filter(f=>f.parte_id===id);
    for(const f of fotos) await eliminarFotoStorage(f.nombre||f.id);
    // La FK con CASCADE elimina partes_fotos automáticamente
    await api(`partes?id=eq.${id}`,'DELETE');
    partes=partes.filter(p=>p.id!==id);
    partesFotos=partesFotos.filter(f=>f.parte_id!==id);
    hideSync();renderPartes();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

async function marcarRealizado(id){
  const pt=partes.find(x=>x.id===id);
  if(!pt) return;
  const fecha=fechaHoyISO();
  showSync('Actualizando...');
  try{
    await api(`partes?id=eq.${id}`,'PATCH',{estado:'realizado',fecha_realizado:fecha});
    pt.estado='realizado';
    pt.fecha_realizado=fecha;
    hideSync();renderPartes();
    if(document.getElementById('page-diario').classList.contains('active')) renderDiario();
  }catch(e){hideSync();alert('Error: '+e.message);}
}

async function retirarParte(id){
  if(!confirm('¿Retirar este parte? Se eliminará de la lista de partes activos.')) return;
  // Retirar = eliminar el parte completamente
  await eliminarParte(id);
}

function badgeParte(estado){
  if(estado==='urgente') return '<span class="badge urgente">🔴 Urgente</span>';
  if(estado==='realizado') return '<span class="badge realizado">🟢 Realizado</span>';
  return '<span class="badge pendiente">🟡 Pendiente</span>';
}

function renderPartes(){
  const el=document.getElementById('partes-list');
  const q=(document.getElementById('search-parte').value||'').toLowerCase();
  const fl=document.getElementById('filter-plocal').value;
  const fe=document.getElementById('filter-pestado').value;

  let lista=[...partes];
  if(q) lista=lista.filter(p=>p.titulo.toLowerCase().includes(q)||(p.descripcion||'').toLowerCase().includes(q));
  if(fl) lista=lista.filter(p=>p.local===fl);
  if(fe) lista=lista.filter(p=>p.estado===fe);

  // Ordenar: urgente primero, luego pendiente, luego realizado; dentro de cada grupo por fecha desc
  const orden={urgente:0,pendiente:1,realizado:2};
  lista.sort((a,b)=>(orden[a.estado]||1)-(orden[b.estado]||1)||0);

  if(!lista.length){el.innerHTML='<div class="empty">No hay partes que coincidan</div>';return;}

  el.innerHTML=lista.map(pt=>{
    const fotos=partesFotos.filter(f=>f.parte_id===pt.id);
    const fotosHTML=fotos.length?`<div class="parte-fotos">${fotos.map(f=>`<img class="parte-foto" src="${f.url}" onclick="openLightbox('${f.url}')" loading="lazy">`).join('')}</div>`:'';
    const acciones=`
      <div class="parte-actions">
        <button onclick="openModal('editparte','${pt.id}')">✏️ Editar</button>
        ${pt.estado!=='realizado'?`<button class="green" onclick="marcarRealizado('${pt.id}')">✅ Realizado</button>`:''}
        ${pt.estado==='realizado'?`<button class="amber-btn" onclick="retirarParte('${pt.id}')">📤 Retirar</button>`:''}
        <button class="danger-btn" onclick="eliminarParte('${pt.id}')">🗑 Borrar</button>
      </div>`;
    return `<div class="parte-card ${pt.estado}">
      <div class="parte-header">
        <div class="parte-titulo">${pt.titulo}</div>
        ${badgeParte(pt.estado)}
      </div>
      <div class="parte-meta">
        <span class="badge dest">${pt.local}</span>
        <span class="parte-fecha">📅 Creado: ${isoADisplay(pt.fecha_creacion)}</span>
        ${pt.fecha_realizado?`<span class="parte-fecha">✅ Realizado: ${isoADisplay(pt.fecha_realizado)}</span>`:''}
      </div>
      ${pt.descripcion?`<div class="parte-desc">📍 ${pt.descripcion}</div>`:''}
      ${pt.notas?`<div class="parte-desc" style="font-style:italic">📝 ${pt.notas}</div>`:''}
      ${fotosHTML}
      ${acciones}
    </div>`;
  }).join('');
}

// ===== DIARIO =====
function renderDiario(){
  const fechaSel=document.getElementById('diario-fecha').value;
  if(!fechaSel) return;
  const lista=partes.filter(p=>p.estado==='realizado'&&p.fecha_realizado===fechaSel);
  const resumen=document.getElementById('diario-resumen');
  const diarioList=document.getElementById('diario-list');

  resumen.innerHTML=`<strong>${lista.length} parte${lista.length!==1?'s':''} realizado${lista.length!==1?'s':''}</strong> el ${isoADisplay(fechaSel)}`;

  if(!lista.length){
    diarioList.innerHTML='<div class="empty">No hay partes realizados este día</div>';
    return;
  }

  // Agrupar por local
  const porLocal={};
  lista.forEach(p=>{
    if(!porLocal[p.local]) porLocal[p.local]=[];
    porLocal[p.local].push(p);
  });

  let html='';
  for(const [local,partesList] of Object.entries(porLocal)){
    html+=`<div style="font-size:13px;font-weight:600;color:var(--text2);padding:8px 0 4px">${local}</div>`;
    partesList.forEach(pt=>{
      const fotos=partesFotos.filter(f=>f.parte_id===pt.id);
      html+=`<div class="diario-parte">
        <div class="diario-parte-titulo">${pt.titulo}</div>
        <div class="diario-parte-meta">
          <span>📍 ${pt.descripcion||'Sin descripción'}</span>
          ${pt.notas?`<span>📝 ${pt.notas}</span>`:''}
          ${fotos.length?`<span>📷 ${fotos.length} foto${fotos.length>1?'s':''}</span>`:''}
        </div>
        ${fotos.length?`<div class="parte-fotos" style="margin-top:8px">${fotos.map(f=>`<img class="parte-foto" src="${f.url}" onclick="openLightbox('${f.url}')" loading="lazy">`).join('')}</div>`:''}
      </div>`;
    });
  }
  diarioList.innerHTML=html;
}

function exportDiarioCSV(){
  const fechaSel=document.getElementById('diario-fecha').value;
  const lista=partes.filter(p=>p.estado==='realizado'&&p.fecha_realizado===fechaSel);
  if(!lista.length){alert('No hay partes realizados ese día.');return;}
  let rows='Fecha;Local;Título;Descripción;Notas\n';
  lista.forEach(p=>rows+=`${isoADisplay(p.fecha_realizado)};"${p.local}";"${p.titulo}";"${p.descripcion||''}";"${p.notas||''}"\n`);
  csvDescargar('diario_'+fechaSel.replace(/-/g,'')+'.csv',rows);
}

// ===== LIGHTBOX =====
function openLightbox(url){
  document.getElementById('lightbox-img').src=url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src='';
}

// ===== EXPORTS CSV =====
function csvDescargar(nombre,contenido){
  const blob=new Blob(['\uFEFF'+contenido],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=nombre;a.click();
  URL.revokeObjectURL(url);
}

function exportStockCSV(){
  let rows='Producto;Categoría;Unidad;Stock;Estado;Alerta mínimo\n';
  [...productos].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).forEach(p=>{
    const e=p.stock===0?'Sin stock':p.stock<=p.min?'Stock bajo':'OK';
    rows+=`${p.nombre};${nomCat(p.categoria)};${p.unidad||'uds'};${p.stock};${e};${p.min}\n`;
  });
  csvDescargar('stock_grupodoze_'+hoy()+'.csv',rows);
}

function exportHistCSV(fd){
  let lista=[...historial];
  if(fd) lista=lista.filter(h=>h.destino===fd);
  let rows='Fecha;Producto;Categoría;Tipo;Cantidad;Destino;Nota\n';
  lista.forEach(h=>rows+=`${h.fecha};"${h.prod}";"${nomCat(h.categoria)}";${h.tipo==='entrada'?'Entrada':'Salida'};${h.cant};"${h.destino||''}";"${h.nota||''}"\n`);
  const suf=fd?'_'+fd.toLowerCase().replace(/ /g,'_'):'_completo';
  csvDescargar('historial'+suf+'_'+hoy()+'.csv',rows);
}

document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

cargarDatos();
